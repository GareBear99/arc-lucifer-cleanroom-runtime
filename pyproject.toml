[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "arc-lucifer-cleanroom-runtime"
version = "2.9.0"
description = "Clean-room deterministic cognitive runtime with managed llamafile, receipts, retention, and CLI control"
readme = "README.md"
requires-python = ">=3.11"
authors = [{name = "Gary Doman"}]
dependencies = []

[project.scripts]
lucifer = "lucifer_runtime.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
